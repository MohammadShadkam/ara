<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آرا | تغییر رمز عبور</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0/dist/iife/sdk.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&display=swap');
        
        body {
            background-color: #0F172A;
            color: #F8FAFC;
            font-family: 'Yekan Bakh', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: #1E293B;
            width: 100%;
            max-width: 440px;
            border-radius: 12px;
            border: 1px solid #334155;
            padding: 24px;
            box-sizing: border-box;
        }

        h2 {
            font-size: 20px;
            font-weight: 600;
            color: #F8FAFC;
            margin: 0 0 24px 0;
            text-align: center;
        }

        .input-group {
            margin-bottom: 16px;
        }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #334155;
            background-color: #0F172A;
            color: #F8FAFC;
            box-sizing: border-box;
            font-size: 16px;
        }

        input:focus {
            border-color: #6366F1;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 999px;
            border: none;
            background-color: #6366F1;
            color: #F8FAFC;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #4F46E5;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            margin-top: 16px;
            font-size: 14px;
            text-align: center;
            display: none;
            padding: 12px;
            border-radius: 8px;
        }

        .success {
            display: block;
            color: #10b981;
            border: 1px solid #10b981;
            background-color: #0F172A;
        }

        .error {
            display: block;
            color: #94A3B8;
            border: 1px solid #334155;
            background-color: #0F172A;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>رمز عبور جدید خود را وارد کنید</h2>
        <form id="resetForm">
            <div class="input-group">
                <input type="password" id="password" placeholder="رمز عبور جدید (حداقل ۸ کاراکتر)" required minlength="8">
            </div>
            <button type="submit" id="submitBtn">ثبت رمز جدید</button>
        </form>
        <div id="message" class="message"></div>
    </div>

    <script>
        const client = new Appwrite.Client()
            .setEndpoint('https://[YOUR_APPWRITE_ENDPOINT]/v1') 
            .setProject('[YOUR_PROJECT_ID]');

        const account = new Appwrite.Account(client);
        
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('userId');
        const secret = urlParams.get('secret');

        const form = document.getElementById('resetForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        if (!userId || !secret) {
            messageDiv.className = "message error";
            messageDiv.innerText = "لینک بازیابی نامعتبر یا منقضی شده است.";
            submitBtn.disabled = true;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('password').value;
            submitBtn.disabled = true;
            messageDiv.className = "message error";
            messageDiv.innerText = "در حال ثبت تغییرات...";

            try {
                await account.updateRecovery(userId, secret, newPassword);
                messageDiv.className = "message success";
                messageDiv.innerText = "رمز عبور با موفقیت تغییر کرد. می‌توانید وارد اپلیکیشن شوید.";
            } catch (error) {
                submitBtn.disabled = false;
                messageDiv.className = "message error";
                messageDiv.innerText = error.message || "خطایی رخ داد. مجدداً تلاش کنید.";
            }
        });
    </script>
</body>
</html>
